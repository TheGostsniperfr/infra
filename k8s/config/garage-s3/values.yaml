garage:
  replicationFactor: 1
deployment:
  replicaCount: 1
persistence:
  meta:
    storageClass: "longhorn"
    size: 2Gi
  data:
    storageClass: "longhorn"
    size: 20Gi
ingress:
  s3:
    api:
      enabled: false
  web:
    enabled: false
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi
