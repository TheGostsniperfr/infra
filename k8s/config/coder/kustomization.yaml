apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: coder

resources:
  - namespace.yaml
  - secret.yaml

helmGlobals:
  chartHome: ../../../charts

helmCharts:
  - name: coder
    repo: https://helm.coder.com/v2
    version: 2.32.0
    releaseName: coder
    namespace: coder
    valuesFile: values.yaml

  - name: secure-route
    releaseName: coder-routes
    namespace: coder
    valuesFile: values-secure-route.yaml
