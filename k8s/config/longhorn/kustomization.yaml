apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: longhorn-system

resources:
  - namespace.yaml
  - secret.yaml

helmGlobals:
  chartHome: ../../../charts

helmCharts:
  - name: longhorn
    repo: https://charts.longhorn.io/
    version: 1.9.0
    releaseName: longhorn
    namespace: longhorn-system
    valuesFile: longhorn-values.yaml

  - name: secure-route
    releaseName: longhorn-routes
    namespace: longhorn-system
    valuesFile: values-secure-route.yaml
