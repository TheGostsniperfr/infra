apiVersion: ricoberger.de/v1alpha1
kind: VaultSecret
metadata:
  name: keycloak-db-secret
  namespace: keycloak
spec:
  path: kvv2/keycloak/db
  vaultRole: keycloak-role
  keys:
    - password
  type: Opaque
---
apiVersion: ricoberger.de/v1alpha1
kind: VaultSecret
metadata:
  name: keycloak-admin-password
  namespace: keycloak
spec:
  path: kvv2/keycloak/admin
  vaultRole: keycloak-role
  keys:
    - password
  type: Opaque
