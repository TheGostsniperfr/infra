apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keycloak

resources:
  - namespace.yaml
  - secrets.yaml
  - postgres.yaml
  - reference-grant.yaml

helmGlobals:
  chartHome: ../../../charts

helmCharts:
  - name: keycloakx
    repo: https://codecentric.github.io/helm-charts
    version: "7.1.9"
    releaseName: keycloakx
    namespace: keycloak
    valuesFile: values.yaml

  - name: secure-route
    releaseName: keycloak-routes
    namespace: keycloak
    valuesFile: values-secure-route.yaml
