global:
  enabled: true
  tlsDisable: true
  namespace: "vault"

  injector:
    enabled: false

server:
  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        address = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_disable = 1
      }
      storage "raft" {
        path = "/vault/data"
      }

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "256Mi"
      cpu: "250m"

  dataStorage:
    enabled: true
    storageClass: "longhorn"
    size: 10Gi

  auditStorage:
    enabled: true
    storageClass: "longhorn"
    size: 10Gi
