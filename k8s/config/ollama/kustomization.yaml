apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ollama

resources:
  - namespace.yaml
  - service.yaml
  - endpoints.yaml
  - certificate.yaml

helmGlobals:
  chartHome: ../../../charts

helmCharts:
  - name: secure-route
    releaseName: ollama-routes
    namespace: ollama
    valuesFile: values-secure-route.yaml
