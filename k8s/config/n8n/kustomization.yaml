apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: n8n

resources:
  - namespace.yaml
  - secret.yaml

helmGlobals:
  chartHome: ../../../charts

helmCharts:
  - name: n8n
    repo: oci://8gears.container-registry.com/library
    version: "1.0.10"
    releaseName: n8n
    namespace: n8n
    valuesFile: values.yaml

  - name: secure-route
    releaseName: n8n-routes
    namespace: n8n
    valuesFile: values-secure-route.yaml
