apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vaultwarden

resources:
  - namespace.yaml
  - secret.yaml

helmGlobals:
  chartHome: ../../../charts

helmCharts:
  - name: vaultwarden
    repo: https://guerzon.github.io/vaultwarden
    version: "0.43.1"
    releaseName: vaultwarden
    namespace: vaultwarden
    valuesFile: values.yaml

  - name: secure-route
    releaseName: vaultwarden-routes
    namespace: vaultwarden
    valuesFile: values-secure-route.yaml
