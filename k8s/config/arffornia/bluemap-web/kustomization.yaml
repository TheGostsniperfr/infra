apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: arffornia-bluemap-web
resources:
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - nginx-config.yaml

helmGlobals:
  chartHome: ../../../../charts

helmCharts:
  - name: secure-route
    releaseName: bluemap-routes
    namespace: arffornia-bluemap-web
    valuesFile: values-secure-route.yaml
