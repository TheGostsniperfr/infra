replicaCount: 1

images:
  # Image of the front / web server used (default nginx)
  frontend:
    repository: ghcr.io/arffornia/nginx_arffornia_website
    pullPolicy: Always
    tag: "latest"

  # Image of the Laravel app used
  backend:
    repository: ghcr.io/arffornia/arffornia_website
    pullPolicy: Always
    tag: "latest"
    port: 9000
    host: "127.0.0.1"

syncServiceAccounts:
  enabled: true

migrateAndSeedDB:
  enabled: false

envFrom:
  - secretRef:
      name: arffornia-website-secret
  - secretRef:
      name: arffornia-website-secret-template
  - secretRef:
      name: arffornia-db-secret
  - secretRef:
      name: arffornia-svc-secret
  - secretRef:
      name: arffornia-svc-proxy-secret

  - configMapRef:
      name: arffornia-website-config

ingress:
  enabled: false

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    memory: 512Mi
