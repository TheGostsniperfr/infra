apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage-s3
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
  project: default
  destination:
    name: in-cluster
    namespace: garage-s3
  sources:
    - repoURL: https://github.com/TheGostsniperfr/infra.git
      targetRevision: HEAD
      path: k8s/config/garage-s3
      ref: my-repo

    - repoURL: https://git.deuxfleurs.fr/Deuxfleurs/garage.git
      targetRevision: v2.2.0
      path: script/helm/garage
      helm:
        releaseName: garage
        valueFiles:
          - $my-repo/k8s/config/garage-s3/values.yaml
