apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # Core ArgoCD
  - argocd.yaml

  # Infrastructure Layer
  - kube-system.yaml
  - kyverno.yaml
  - envoy-gateway.yaml
  - gateway-infra.yaml
  - cert-manager.yaml
  - metallb.yaml

  # Vault & Secrets
  - vault.yaml
  - vault-secrets-operator.yaml

  # Identity & Auth
  - keycloak.yaml

  # Storage
  - longhorn.yaml
  - csi-driver-smb.yaml
  - garage-s3.yaml
  - minio-s3.yaml

  # Database
  - postgres-operator.yaml
  - postgres.yaml

  # Monitoring
  - monitoring.yaml

  # Applications
  - adminer.yaml
  - nextcloud.yaml
  - vaultwarden.yaml
  - n8n.yaml
  - ollama.yaml
  - plex.yaml
  - coder.yaml

  # Arffornia Apps
  - arffornia/
